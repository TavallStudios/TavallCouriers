name: Java CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - uses: gradle/actions/wrapper-validation@v4
      - name: Build and test
        run: ./gradlew --no-daemon clean check stageDistribution publishToMavenLocal
